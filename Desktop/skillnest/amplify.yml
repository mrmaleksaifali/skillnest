version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Desktop/skillnest/client
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: Desktop/skillnest/client/out
    files:
      - '**/*'
  cache:
    paths:
      - Desktop/skillnest/client/node_modules/**/*
